<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>realizar suma</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <center>
        <form oninput="store.value=parseInt(n1.value)+parseInt(n2.value)">
            <h1>SUMAR</h1>
            <input type="text" name="n1" placeholder="primer numero"><br>
            <input type="text" name="n2" placeholder="segundo numero">
            <p>La respuesta de la suma es: <output name="store"></output></p>
        </form>
        <form oninput="store.value=parseInt(n1.value)-parseInt(n2.value)">
            <h1>RESTAR</h1>
            <input type="text" name="n1" placeholder="primer numero"><br>
            <input type="text" name="n2" placeholder="segundo numero">
            <p>La respuesta resta es: <output name="store"></output></p>
        </form>
        <form oninput="store.value=parseInt(n1.value)*parseInt(n2.value)">
            <h1>MULTIPLICAR</h1>
            <input type="text" name="n1" placeholder="primer numero"><br>
            <input type="text" name="n2" placeholder="segundo numero">
            <p>La respuesta de la multiplicacion es: <output name="store"></output></p>
        </form>
        <form oninput="store.value=(parseInt(n1.value)/parseInt(n2.value)).toFixed(1)">
            <h1>DIVIDIR</h1>
            <input type="text" name="n1" placeholder="primer numero"><br>
            <input type="text" name="n2" placeholder="segundo numero">
            <p>La respuesta de la division es: <output name="store"></output></p>
        </form>
        </center>
    </body>
</html>
